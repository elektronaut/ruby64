---
plugins:
  - rubocop-minitest
  - rubocop-rake
  - rubocop-rspec

inherit_from:
  - .rubocop_todo.yml

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.3

Metrics/AbcSize:
  Exclude:
    - "lib/badline/instruction.rb"

Metrics/BlockLength:
  Exclude:
    - "spec/**/*.rb"

Metrics/ClassLength:
  Exclude:
    - "lib/badline/instruction.rb"
    - "lib/badline/vic.rb"

Metrics/MethodLength:
  Exclude:
    - "lib/badline/instruction.rb"

Style/AsciiComments:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/StringLiterals:
  EnforcedStyle: double_quotes

Layout/LineLength:
  AutoCorrect: true
  Max: 120

Layout/MultilineOperationIndentation:
  EnforcedStyle: aligned
